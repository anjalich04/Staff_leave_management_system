{% extends 'base.html' %}
{% block content %}
{% include 'admin/_styles.html' %}

<div class="admin-shell">
  <div class="admin-page-head">
    <div>
      <h5 class="admin-title">{% if leave_type %}Edit Leave Type{% else %}Add Leave Type{% endif %}</h5>
      <p class="admin-subtitle">Define and maintain leave categories with clear descriptions.</p>
    </div>
  </div>

  <div class="admin-card"><div class="admin-card-content">
    {% include 'admin/_messages.html' %}
    <form method="POST">
      {% csrf_token %}
      <div class="admin-form-grid">
        <div class="admin-field"><label>Leave Type Name</label><input type="text" name="name" required value="{{ leave_type.name|default:'' }}"></div>
        <div class="admin-field"><label>Description</label><textarea name="description">{{ leave_type.description|default:'' }}</textarea></div>
        <div class="admin-field"><label><input type="checkbox" name="is_active" {% if leave_type %}{% if leave_type.is_active %}checked{% endif %}{% else %}checked{% endif %}> Active</label></div>
      </div>
      <button type="submit" class="btn admin-btn">{% if leave_type %}Update{% else %}Add{% endif %} Leave Type</button>
      <a href="{% url 'leave_type_list' %}" class="btn admin-btn-light">Back</a>
    </form>
  </div></div>
</div>
{% endblock %}
