<style>
:root {
  --admin-blue-900: #0b3b91;
  --admin-blue-800: #0f4aa5;
  --admin-blue-700: #1565c0;
  --admin-blue-100: #e8f1ff;
  --admin-surface: #ffffff;
  --admin-bg: #f4f8ff;
  --admin-text: #1b2a4a;
  --admin-muted: #60708f;
  --admin-border: #d9e5fb;
  --status-approved: #1f8f4c;
  --status-rejected: #c62828;
  --status-pending: #f1a317;
}

.admin-shell {
  background: radial-gradient(circle at top right, #dbe8ff 0, #f4f8ff 40%, #f7faff 100%);
  border-radius: 16px;
  padding: 22px;
}

.admin-page-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.admin-title {
  margin: 0;
  color: var(--admin-blue-900);
  font-weight: 700;
  font-size: 1.7rem;
}

.admin-subtitle {
  margin: 6px 0 0;
  color: var(--admin-muted);
  font-size: 0.98rem;
}

.admin-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 14px;
}

.admin-card {
  grid-column: span 12;
  background: var(--admin-surface);
  border: 1px solid var(--admin-border);
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(15, 74, 165, 0.08);
}

.admin-card-content {
  padding: 18px;
}

.admin-stat-card {
  grid-column: span 12;
  padding: 16px;
  background: linear-gradient(150deg, #fff 0%, #f1f7ff 100%);
  border: 1px solid var(--admin-border);
  border-radius: 12px;
}

.admin-stat-label { color: var(--admin-muted); font-size: 0.9rem; margin-bottom: 10px; }
.admin-stat-value { color: var(--admin-blue-900); font-weight: 700; font-size: 2rem; line-height: 1; }

.admin-btn {
  background: var(--admin-blue-700) !important;
  border-radius: 8px;
  text-transform: none;
  font-weight: 600;
}

.admin-btn:hover { background: var(--admin-blue-900) !important; }

.admin-btn-light {
  background: #eef4ff !important;
  color: var(--admin-blue-900) !important;
  border: 1px solid var(--admin-border);
}

.admin-status {
  color: #fff;
  border-radius: 999px;
  display: inline-block;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 700;
}

.admin-status-approved { background: var(--status-approved); }
.admin-status-rejected { background: var(--status-rejected); }
.admin-status-pending { background: var(--status-pending); color: #243041; }

.admin-form-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px;
}

.admin-field { grid-column: span 12; }
.admin-field-half { grid-column: span 6; }

.admin-field label {
  color: var(--admin-blue-900);
  font-size: 0.9rem;
  font-weight: 600;
  display: block;
  margin-bottom: 6px;
}

.admin-field input,
.admin-field select,
.admin-field textarea {
  background: #fff;
  border: 1px solid #cbdcf9;
  border-radius: 8px;
  box-sizing: border-box;
  height: auto;
  padding: 10px 12px;
  width: 100%;
}

.admin-field textarea { min-height: 92px; }

.admin-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  table-layout: fixed;
}

.admin-table thead th {
  background: #edf4ff;
  color: var(--admin-blue-900);
  font-size: 12px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  padding: 10px 8px;
  border-bottom: 1px solid var(--admin-border);
}

.admin-table tbody td {
  padding: 10px 8px;
  border-bottom: 1px solid #edf2ff;
  color: var(--admin-text);
  vertical-align: top;
  word-wrap: break-word;
}

.admin-table tbody tr:hover { background: #f8fbff; }

.admin-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  object-fit: cover;
}

.admin-note {
  margin-top: 6px;
  color: #c62828;
  font-size: 12px;
}

@media (min-width: 801px) {
  .admin-stat-card { grid-column: span 3; }
}

@media (max-width: 800px) {
  .admin-shell { padding: 14px; }
  .admin-title { font-size: 1.35rem; }
  .admin-field-half { grid-column: span 12; }
  .admin-table, .admin-table thead, .admin-table tbody, .admin-table th, .admin-table td, .admin-table tr {
    display: block;
  }
  .admin-table thead { display: none; }
  .admin-table tbody tr {
    border: 1px solid var(--admin-border);
    border-radius: 10px;
    padding: 8px;
    margin-bottom: 10px;
    background: #fff;
  }
  .admin-table tbody td {
    border: 0;
    padding: 6px 4px;
  }
  .admin-table tbody td::before {
    content: attr(data-label);
    display: block;
    color: var(--admin-muted);
    font-size: 11px;
    margin-bottom: 2px;
    text-transform: uppercase;
  }
}
</style>
