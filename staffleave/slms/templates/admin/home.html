{% extends 'base.html' %}
{% block content %}
<style>
.admin-card { border-radius: 10px; }
.admin-card .card-content { padding: 22px; }
.admin-page-title { color: #1565c0; }
.admin-stat { font-size: 30px; font-weight: 700; color: #1565c0; }
</style>


<div class="middle-content">
    <div class="row no-m-t no-m-b">
        <h5 class="admin-page-title">Welcome {{ user.first_name }} {{ user.last_name }}!!!</h5>
    <div class="col s12 m6 l4">
        <div class="card stats-card admin-card">
            <div class="card-content">
            
                <span class="card-title">Total Regd Staff</span>
                <a href="{% url 'view_staff' %}"><span class="admin-stat">{{staff_count}}</span></a>
            </div>
            <div id="sparkline-bar"></div>
        </div>
    </div>
        <div class="col s12 m6 l4">
        <div class="card stats-card admin-card">
            <div class="card-content">
            
                <span class="card-title">Total Leave Receive </span>
                <a href="{% url 'staff_leave_view_admin' %}"><span class="admin-stat">{{leave_count}}</span></a>
            </div>
            <div id="sparkline-line"></div>
        </div>
    </div>
</div>
 
   
</div>
{% endblock %}
