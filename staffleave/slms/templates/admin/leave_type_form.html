{% extends 'base.html' %}
{% block content %}
<style>
.admin-card { border-radius: 10px; }
.admin-card .card-content { padding: 22px; }
.admin-page-title { color: #1565c0; padding-top: 10px; padding-left: 10px; }
.admin-btn-primary { background: #1565c0 !important; }
.admin-btn-primary:hover { background: #0d47a1 !important; }
</style>

<main class="mn-inner">
    <h5 class="admin-page-title">{% if leave_type %}Edit Leave Type{% else %}Add Leave Type{% endif %}</h5>
    <div class="row">
        <div class="middle-content">
            <div class="row no-m-t no-m-b">
                <div class="col s12 m12 l12">
                    <div class="card admin-card">
                        <div class="card-content">
                            {% if messages %}
                            {% for message in messages %}
                            <div class="alert alert-warning alert-dismissible fade show" role="alert">
                                {{message}}
                            </div>
                            {% endfor %}
                            {% endif %}
                            <form method="POST">
                                {% csrf_token %}
                                <div class="form-group row">
                                    <label class="col-sm-2 col-form-label">Leave Type Name</label>
                                    <div class="col-sm-10">
                                        <input type="text" name="name" class="form-control" required value="{{ leave_type.name|default:'' }}">
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <label class="col-sm-2 col-form-label">Description</label>
                                    <div class="col-sm-10">
                                        <textarea name="description" rows="4" class="form-control">{{ leave_type.description|default:'' }}</textarea>
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <label class="col-sm-2 col-form-label">Is Active</label>
                                    <div class="col-sm-10" style="padding-top: 7px;">
                                        <input type="checkbox" name="is_active" {% if leave_type %}{% if leave_type.is_active %}checked{% endif %}{% else %}checked{% endif %}>
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <div class="col-sm-10">
                                        <button type="submit" class="btn admin-btn-primary">{% if leave_type %}Update{% else %}Add{% endif %} Leave Type</button>
                                        <a href="{% url 'leave_type_list' %}" class="btn grey">Back</a>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
