{% extends 'base.html' %}
{% block content %}
{% include 'admin/_styles.html' %}

<div class="admin-shell">
  <div class="admin-page-head">
    <div>
      <h5 class="admin-title">Update Staff</h5>
      <p class="admin-subtitle">Modify staff information and access credentials.</p>
    </div>
  </div>

  <div class="admin-card"><div class="admin-card-content">
    {% include 'admin/_messages.html' %}
    <form method="POST" action="{% url 'update_staff' %}" enctype="multipart/form-data">
      {% csrf_token %}
      <input type="hidden" name="staff_id" value="{{staff.admin.id}}">
      <div class="admin-form-grid">
        <div class="admin-field admin-field-half"><label>First Name</label><input type="text" name="first_name" value="{{staff.admin.first_name}}" required></div>
        <div class="admin-field admin-field-half"><label>Last Name</label><input type="text" name="last_name" value="{{staff.admin.last_name}}" required></div>
        <div class="admin-field admin-field-half"><label>Email</label><input type="email" name="email" value="{{staff.admin.email}}" required></div>
        <div class="admin-field admin-field-half"><label>Username</label><input type="text" name="username" value="{{staff.admin.username}}" required></div>
        <div class="admin-field admin-field-half"><label>New Password</label><input type="password" name="password" placeholder="Only fill to change password"></div>
        <div class="admin-field admin-field-half"><label>Gender</label><select name="gender" required><option value="{{staff.gender}}">{{staff.gender}}</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select></div>
        <div class="admin-field admin-field-half"><label>Profile Picture</label><input type="file" name="profile_pic"></div>
        <div class="admin-field"><label>Address</label><textarea name="address" required>{{staff.address}}</textarea></div>
      </div>
      <button type="submit" class="btn admin-btn" style="margin-top:14px;">Update Staff</button>
    </form>
  </div></div>
</div>
{% endblock %}
