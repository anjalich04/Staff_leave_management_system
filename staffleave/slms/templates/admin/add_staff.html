{% extends 'base.html' %}
{% block content %}
{% include 'admin/_styles.html' %}

<div class="admin-shell">
  <div class="admin-page-head">
    <div>
      <h5 class="admin-title">Add Staff</h5>
      <p class="admin-subtitle">Create a new staff account with complete identity details.</p>
    </div>
  </div>

  <div class="admin-card"><div class="admin-card-content">
    {% include 'admin/_messages.html' %}
    <form method="POST" action="{% url 'add_staff' %}" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="admin-form-grid">
        <div class="admin-field admin-field-half"><label>First Name</label><input type="text" name="first_name" required></div>
        <div class="admin-field admin-field-half"><label>Last Name</label><input type="text" name="last_name" required></div>
        <div class="admin-field admin-field-half"><label>Email</label><input type="email" name="email" required></div>
        <div class="admin-field admin-field-half"><label>Username</label><input type="text" name="username" required></div>
        <div class="admin-field admin-field-half"><label>Password</label><input type="password" name="password" required></div>
        <div class="admin-field admin-field-half"><label>Gender</label><select name="gender" required><option value="">Choose gender</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select></div>
        <div class="admin-field admin-field-half"><label>Profile Picture</label><input type="file" name="profile_pic" required></div>
        <div class="admin-field"><label>Address</label><textarea name="address" required></textarea></div>
      </div>
      <button type="submit" class="btn admin-btn" style="margin-top:14px;">Add Staff</button>
    </form>
  </div></div>
</div>
{% endblock %}
